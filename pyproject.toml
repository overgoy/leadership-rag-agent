# Minimal project config — anchors ruff's lint + format rules explicitly so
# `ruff check` / `ruff format` behave identically for everyone (and in CI).
# The package itself is run via the src/ layout (see README), not pip-installed.

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
# Pyflakes (F) + the default pycodestyle subset (E4/E7/E9), plus import sorting
# (I) and pycodestyle warnings (W). Line length is shaped by the formatter rather
# than enforced as an E501 error, so prose/URLs in strings don't trip the linter.
select = ["E4", "E7", "E9", "F", "I", "W"]

[tool.ruff.format]
# Defaults (double quotes, 88 cols) — declared for explicitness.
quote-style = "double"